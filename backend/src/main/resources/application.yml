server:
  port: 8080
  # HTTPS: on Railway, TLS is terminated at the load balancer.
  # For local HTTPS, generate a keystore and uncomment:
  # ssl:
  #   key-store: classpath:keystore.p12
  #   key-store-password: ${SSL_KEYSTORE_PASSWORD}
  #   key-store-type: PKCS12

spring:
  application:
    name: bankops-backend

  datasource:
    url: jdbc:h2:mem:bankops;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: true
    locations: classpath:db/migration

bankops:
  cors:
    allowed-origins:
      - "http://localhost:3000"

jwt:
  secret: ${BANKOPS_JWT_SECRET:bankops-dev-secret-change-in-production-min32}
  "[expiry-minutes]": 480

logging:
  level:
    fi.cgi.bankops: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
