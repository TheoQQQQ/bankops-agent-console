server:
  port: ${PORT:8080}

spring:
  application:
    name: bankops-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:bankops;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration

bankops:
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - ${FRONTEND_URL:http://localhost:3000}
  jwt:
    secret: ${BANKOPS_JWT_SECRET:bankops-dev-secret-change-in-production-min32}
    expiry-minutes: 480

logging:
  level:
    fi.cgi.bankops: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO